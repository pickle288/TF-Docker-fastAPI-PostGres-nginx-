#conf nginx.conf
events {
    worker_connections 1024;
}
http {
    server {
        listen 80;
        location / {
            proxy_connect_timeout 5s;                                                   #pour définir un délai d'attente de connexion de 5 secondes
            proxy_read_timeout 20s;                                                      #pour définir un délai d'attente de lecture
            proxy_pass http://fastapi_container:80;                                     #pour rediriger vers le conteneur FastAPI port 8000
            proxy_set_header Host $host;                                        #pour garder le nom d'hôte d'origine
            proxy_set_header X-Real-IP $remote_addr;                            #pour garder l'adresse IP d'origine du client
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;        #pour garder la chaîne d'adresses IP des clients  
        }
    }
}